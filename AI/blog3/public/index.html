<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Blog</title>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Simple Blog</h1>
    <button id="back-btn" style="display:none;">← 返回列表</button>
  </header>
  
  <main>
    <section id="post-form-section" style="display:none;">
      <h2 id="form-title">新增文章</h2>
      <form id="post-form">
        <input type="hidden" id="post-id">
        <div>
          <label for="title">標題</label>
          <input type="text" id="title" required>
        </div>
        <div>
          <label>內容</label>
          <div id="editor"></div>
        </div>
        <button type="submit" id="submit-btn">發布</button>
        <button type="button" id="cancel-btn">取消</button>
      </form>
    </section>

    <section id="post-detail-section" style="display:none;">
      <article id="post-detail-content"></article>
      <div class="actions">
        <button class="edit-btn" id="detail-edit-btn">編輯</button>
        <button class="delete-btn" id="detail-delete-btn">刪除</button>
      </div>
    </section>

    <section id="posts-section">
      <div id="posts-header">
        <h2>文章列表</h2>
        <button id="new-post-btn" class="edit-btn">新增文章</button>
      </div>
      <div id="posts-container"></div>
    </section>
  </main>

  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
