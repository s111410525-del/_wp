<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Blog</title>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Simple Blog</h1>
    <div id="auth-section">
      <span id="welcome-text"></span>
      <button id="back-btn" style="display:none;">← 返回列表</button>
      <button id="login-btn">登入</button>
      <button id="register-btn">註冊</button>
      <button id="logout-btn" style="display:none;">登出</button>
      <button id="switch-btn" style="display:none;">切換帳號</button>
    </div>
  </header>
  
  <main>
    <section id="auth-section-page" class="auth-modal" style="display:none;">
      <div class="auth-container">
        <h2 id="auth-form-title">登入</h2>
        <form id="auth-form">
          <div>
            <label for="auth-username">帳號</label>
            <input type="text" id="auth-username" required>
          </div>
          <div>
            <label for="auth-password">密碼</label>
            <input type="password" id="auth-password" required>
          </div>
          <button type="submit" id="auth-submit-btn">登入</button>
        </form>
        <div class="auth-switch">
          <a href="#" id="auth-switch-link">還沒有帳號？註冊</a>
        </div>
        <button id="auth-close-btn" class="close-btn">×</button>
      </div>
    </section>

    <section id="post-form-section" style="display:none;">
      <h2 id="form-title">新增文章</h2>
      <form id="post-form">
        <input type="hidden" id="post-id">
        <div>
          <label for="title">標題</label>
          <input type="text" id="title" required>
        </div>
        <div>
          <label>內容</label>
          <div id="editor"></div>
        </div>
        <button type="submit" id="submit-btn">發布</button>
        <button type="button" id="cancel-btn">取消</button>
      </form>
    </section>

    <section id="post-detail-section" style="display:none;">
      <article id="post-detail-content"></article>
      <div class="post-actions-bar">
        <div class="like-share">
          <button id="like-btn" class="like-btn">
            <span id="like-icon">♡</span>
            <span id="like-count">0</span>
          </button>
          <button id="share-btn" class="share-btn">分享</button>
        </div>
      </div>
      <div class="actions" id="detail-actions" style="display:none;">
        <button class="edit-btn" id="detail-edit-btn">編輯</button>
        <button class="delete-btn" id="detail-delete-btn">刪除</button>
      </div>
      <div id="comments-section">
        <h3>留言</h3>
        <div id="comments-list"></div>
        <div id="comment-form" style="display:none;">
          <textarea id="comment-input" placeholder="輸入留言..." rows="3"></textarea>
          <button id="comment-submit-btn">送出留言</button>
        </div>
        <div id="comment-login-hint" style="display:none;">
          <a href="#" onclick="loginBtn.click(); return false;">登入</a>後可留言
        </div>
      </div>
    </section>

    <section id="posts-section">
      <div id="posts-header">
        <h2>文章列表</h2>
        <button id="new-post-btn" class="edit-btn" style="display:none;">新增文章</button>
      </div>
      <div id="posts-container"></div>
    </section>
  </main>

  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
